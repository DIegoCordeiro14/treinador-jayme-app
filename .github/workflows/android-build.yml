name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies + Capacitor
        run: |
          npm install --no-audit --no-fund
          npm install --no-audit --no-fund @capacitor/core @capacitor/cli @capacitor/android @capacitor/geolocation @capacitor-community/background-geolocation

      - name: Create Capacitor config (shell remoto -> Vercel)
        run: |
          cat > capacitor.config.ts <<'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'com.coachedn.app',
            appName: 'Coach EDN',
            webDir: 'www',
            server: {
              url: 'https://treinador-jayme-app.vercel.app',
              cleartext: false,
            },
          };

          export default config;
          EOF
          mkdir -p www
          echo '<!doctype html><html><body>Coach EDN</body></html>' > www/index.html

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Add background-location permissions
        run: |
          python3 - <<'EOF'
          p = 'android/app/src/main/AndroidManifest.xml'
          s = open(p).read()
          perms = '''    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
          '''
          if 'ACCESS_FINE_LOCATION' not in s:
              s = s.replace('</manifest>', perms + '</manifest>')
          open(p, 'w').write(s)
          print('Manifest atualizado')
          EOF

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: coach-edn-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
