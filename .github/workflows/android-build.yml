name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies + Capacitor 8 + Health
        run: |
          npm install --no-audit --no-fund
          npm install --no-audit --no-fund \
            @capacitor/core@8 @capacitor/cli@8 @capacitor/android@8 @capacitor/app@8 \
            @capacitor/geolocation@8 @capacitor-community/background-geolocation capacitor-health@8 @capacitor/filesystem@8 @capacitor-community/file-opener cordova-plugin-request-location-accuracy

      - name: Create Capacitor config (shell remoto -> Vercel)
        run: |
          cat > capacitor.config.ts <<'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'com.coachedn.app',
            appName: 'Coach EDN',
            webDir: 'www',
            server: {
              url: 'https://treinador-jayme-app.vercel.app',
              cleartext: false,
            },
            android: {
              adjustMarginsForEdgeToEdge: 'force',
            },
          };

          export default config;
          EOF
          mkdir -p www
          echo '<!doctype html><html><body>Coach EDN</body></html>' > www/index.html

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: SDK / AGP para Health Connect (compileSdk 36, minSdk 26, AGP 8.9.1)
        run: |
          sed -i "s/compileSdkVersion = .*/compileSdkVersion = 36/" android/variables.gradle
          # targetSdk 35: mantem o opt-out do edge-to-edge (em 36 o Android ignora e a status bar sobrepoe)
          sed -i "s/targetSdkVersion = .*/targetSdkVersion = 35/" android/variables.gradle
          sed -i "s/minSdkVersion = .*/minSdkVersion = 26/" android/variables.gradle
          sed -i "s#com.android.tools.build:gradle:[0-9.]*#com.android.tools.build:gradle:8.9.1#" android/build.gradle
          grep -E "compileSdkVersion|targetSdkVersion|minSdkVersion" android/variables.gradle
          grep -E "tools.build:gradle" android/build.gradle

      - name: Permissões de localização, Health Connect rationale e edge-to-edge
        run: |
          python3 - <<'EOF'
          p = 'android/app/src/main/AndroidManifest.xml'
          s = open(p).read()
          perms = '''    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />
              <queries>
                  <package android:name="com.google.android.apps.healthdata" />
              </queries>
          '''
          if 'ACCESS_FINE_LOCATION' not in s:
              s = s.replace('</manifest>', perms + '</manifest>')

          # Activity-alias para o Health Connect mostrar a tela de justificativa/uso
          alias = '''        <activity-alias
                      android:name="ViewPermissionUsageActivity"
                      android:exported="true"
                      android:targetActivity=".MainActivity"
                      android:permission="android.permission.START_VIEW_PERMISSION_USAGE">
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW_PERMISSION_USAGE" />
                          <category android:name="android.intent.category.HEALTH_PERMISSIONS" />
                      </intent-filter>
                  </activity-alias>
          '''
          if 'VIEW_PERMISSION_USAGE' not in s:
              s = s.replace('</application>', alias + '    </application>')

          open(p, 'w').write(s)
          print('Manifest atualizado')

          # Opt-out do edge-to-edge forcado do Android 15 (status bar nao sobrepoe)
          sp = 'android/app/src/main/res/values/styles.xml'
          st = open(sp).read()
          item = '        <item name="android:windowOptOutEdgeToEdgeEnforcement">true</item>\n'
          if 'windowOptOutEdgeToEdgeEnforcement' not in st:
              st = st.replace('</style>', item + '    </style>')
          open(sp, 'w').write(st)
          print('styles.xml atualizado')
          EOF

      - name: Set version from run number (OTA)
        run: |
          sed -i "s/versionCode 1$/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"1.${{ github.run_number }}\"/" android/app/build.gradle
          grep -E 'versionCode|versionName' android/app/build.gradle

      - name: Keystore de debug FIXO (assinatura estável p/ OTA sem conflito)
        run: |
          # 1) keystore para a localização padrão do AGP (fallback)
          mkdir -p ~/.android
          cp .github/coach-edn-debug.keystore ~/.android/debug.keystore
          # 2) DETERMINÍSTICO: fixa a signingConfig de debug no build.gradle do app
          cp .github/coach-edn-debug.keystore android/app/coach-edn-debug.keystore
          python3 - <<'EOF'
          p = 'android/app/build.gradle'
          s = open(p).read()
          block = '''    signingConfigs {
              debug {
                  storeFile file('coach-edn-debug.keystore')
                  storePassword 'android'
                  keyAlias 'androiddebugkey'
                  keyPassword 'android'
              }
          }
          '''
          if 'coach-edn-debug.keystore' not in s:
              s = s.replace('android {\n', 'android {\n' + block, 1)
          open(p, 'w').write(s)
          print('signingConfig debug fixado no build.gradle')
          EOF
          grep -n "coach-edn-debug.keystore" android/app/build.gradle || true
          keytool -list -keystore .github/coach-edn-debug.keystore -storepass android 2>/dev/null | grep -i SHA1 || true

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk coach-edn-v1.${{ github.run_number }}.apk

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: coach-edn-debug-apk
          path: coach-edn-v1.${{ github.run_number }}.apk
          retention-days: 30

      - name: Publish Release (canal OTA)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ github.run_number }}
          name: Coach EDN APK v1.${{ github.run_number }}
          body: "APK Android (debug) do Coach EDN com Health Connect (Capacitor 8). O app instalado detecta esta release e oferece a atualização automaticamente."
          files: coach-edn-v1.${{ github.run_number }}.apk
          make_latest: true
