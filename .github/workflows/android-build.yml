name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies + Capacitor
        run: |
          npm install --no-audit --no-fund
          npm install --no-audit --no-fund @capacitor/core@7 @capacitor/cli@7 @capacitor/android@7 @capacitor/app@7 @capacitor/geolocation@7 @capacitor-community/background-geolocation @kiwi-health/capacitor-health-connect

      - name: Create Capacitor config (shell remoto -> Vercel)
        run: |
          cat > capacitor.config.ts <<'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'com.coachedn.app',
            appName: 'Coach EDN',
            webDir: 'www',
            server: {
              url: 'https://treinador-jayme-app.vercel.app',
              cleartext: false,
            },
            android: {
              adjustMarginsForEdgeToEdge: 'force',
            },
          };

          export default config;
          EOF
          mkdir -p www
          echo '<!doctype html><html><body>Coach EDN</body></html>' > www/index.html

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Add background-location permissions
        run: |
          python3 - <<'EOF'
          p = 'android/app/src/main/AndroidManifest.xml'
          s = open(p).read()
          perms = '''    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
          '''
          if 'ACCESS_FINE_LOCATION' not in s:
              s = s.replace('</manifest>', perms + '</manifest>')

          # Health Connect: permissoes de leitura + visibilidade do pacote + rationale
          health = '''    <uses-permission android:name="android.permission.health.READ_STEPS" />
              <uses-permission android:name="android.permission.health.READ_SLEEP" />
              <uses-permission android:name="android.permission.health.READ_HEART_RATE" />
              <uses-permission android:name="android.permission.health.READ_RESTING_HEART_RATE" />
              <uses-permission android:name="android.permission.health.READ_HEART_RATE_VARIABILITY" />
              <uses-permission android:name="android.permission.health.READ_TOTAL_CALORIES_BURNED" />
              <queries>
                  <package android:name="com.google.android.apps.healthdata" />
              </queries>
          '''
          if 'health.READ_STEPS' not in s:
              s = s.replace('</manifest>', health + '</manifest>')

          alias = '''        <activity-alias
                      android:name="ViewPermissionUsageActivity"
                      android:exported="true"
                      android:targetActivity=".MainActivity"
                      android:permission="android.permission.START_VIEW_PERMISSION_USAGE">
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW_PERMISSION_USAGE" />
                          <category android:name="android.intent.category.HEALTH_PERMISSIONS" />
                      </intent-filter>
                  </activity-alias>
          '''
          if 'VIEW_PERMISSION_USAGE' not in s:
              s = s.replace('</application>', alias + '    </application>')

          open(p, 'w').write(s)
          print('Manifest atualizado')

          # Opt-out do edge-to-edge forcado do Android 15 (status bar sobrepunha o app)
          sp = 'android/app/src/main/res/values/styles.xml'
          st = open(sp).read()
          item = '        <item name="android:windowOptOutEdgeToEdgeEnforcement">true</item>\n'
          if 'windowOptOutEdgeToEdgeEnforcement' not in st:
              st = st.replace('</style>', item + '    </style>')
          open(sp, 'w').write(st)
          print('styles.xml atualizado')
          print(st)
          EOF

      - name: Bump AGP/compileSdk (exigido pelo Health Connect)
        run: |
          sed -i "s#com.android.tools.build:gradle:[0-9.]*#com.android.tools.build:gradle:8.9.1#" android/build.gradle
          sed -i "s/compileSdkVersion = .*/compileSdkVersion = 36/" android/variables.gradle
          sed -i "s/minSdkVersion = .*/minSdkVersion = 26/" android/variables.gradle
          grep -E "tools.build:gradle|compileSdkVersion|minSdkVersion" android/build.gradle android/variables.gradle

      - name: Atualizar Kotlin para 1.9.24 (conhece JVM target 21)
        run: |
          echo "android.javaCompile.suppressSourceTargetDeprecationWarning=true" >> android/gradle.properties
          echo "kotlin.jvm.target.validation.mode=warning" >> android/gradle.properties
          # bump da versão do Kotlin onde quer que o Capacitor a declare
          find android -name "*.gradle" -o -name "variables.gradle" | while read f; do
            sed -i "s/kotlin_version = ['\"][0-9.]*['\"]/kotlin_version = '1.9.24'/g; s/kotlinVersion = ['\"][0-9.]*['\"]/kotlinVersion = '1.9.24'/g; s#org.jetbrains.kotlin:kotlin-gradle-plugin:[0-9.]*#org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24#g" "$f"
          done
          grep -rE "kotlin_version|kotlin-gradle-plugin" android/*.gradle android/**/*.gradle 2>/dev/null | head; echo "done"

      - name: Set version from run number (OTA)
        run: |
          sed -i "s/versionCode 1$/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"1.${{ github.run_number }}\"/" android/app/build.gradle
          grep -E 'versionCode|versionName' android/app/build.gradle

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk coach-edn-v1.${{ github.run_number }}.apk

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: coach-edn-debug-apk
          path: coach-edn-v1.${{ github.run_number }}.apk
          retention-days: 30

      - name: Publish Release (canal OTA)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ github.run_number }}
          name: Coach EDN APK v1.${{ github.run_number }}
          body: "APK Android (debug) do Coach EDN. O app instalado detecta esta release e oferece a atualização automaticamente."
          files: coach-edn-v1.${{ github.run_number }}.apk
          make_latest: true
